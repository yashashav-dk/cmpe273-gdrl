# gdrl — Geo-Distributed Rate Limiter
# Full-stack cluster: 3 Redis + 3 sync services + 3 gateways + Prometheus + Grafana
# For solo simulator/sync development, use: docker-compose -f infra/docker-compose.sync-only.yml up

services:

  # ── Redis — one per region ──────────────────────────────────────────────────
  redis-us:
    image: redis:7-alpine
    container_name: redis-us
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-eu:
    image: redis:7-alpine
    container_name: redis-eu
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-asia:
    image: redis:7-alpine
    container_name: redis-asia
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── API Gateways (one per region) ───────────────────────────────────────────
  # Each listens on :8080 inside the container; host ports 8081/8082/8083
  # differentiate regions. distroless image has no shell, so no health check —
  # Redis health + restart:on-failure is the recovery mechanism.
  gateway-us:
    build: ./gateway
    container_name: gateway-us
    environment:
      - REGION=us
      - REDIS_ADDR=redis-us:6379
      - LISTEN=:8080
    ports:
      - "8081:8080"
    depends_on:
      redis-us:
        condition: service_healthy
    restart: on-failure

  gateway-eu:
    build: ./gateway
    container_name: gateway-eu
    environment:
      - REGION=eu
      - REDIS_ADDR=redis-eu:6379
      - LISTEN=:8080
    ports:
      - "8082:8080"
    depends_on:
      redis-eu:
        condition: service_healthy
    restart: on-failure

  gateway-asia:
    build: ./gateway
    container_name: gateway-asia
    environment:
      - REGION=asia
      - REDIS_ADDR=redis-asia:6379
      - LISTEN=:8080
    ports:
      - "8083:8080"
    depends_on:
      redis-asia:
        condition: service_healthy
    restart: on-failure

  # ── Metrics ─────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      redis-us:
        condition: service_healthy
      redis-eu:
        condition: service_healthy
      redis-asia:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./infra/grafana/data:/var/lib/grafana
    depends_on:
      - prometheus
